<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ay Coffee House — Menü</title>
<link href="https://fonts.bunny.net/css?family=cormorant:400,500,600|inter:400,500&display=swap" rel="stylesheet">
<style>
  :root{
    --h1:#3E3027;--h2:#5E4C40;--body:#7A6C61;--muted:#7B6D62;--accent:#B48A55;
    --price:#926D3C;
    --bg:#F8F4ED;--bg2:#F3EEE5;--card:#FCFAF7;--line:#E8DED1;
    --serif:"Cormorant","Cormorant Garamond",Georgia,serif;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif;
    --serif-ar:"SF Arabic","Geeza Pro","Al Bayan",serif;--sans-ar:"SF Arabic","Geeza Pro",Tahoma,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--body);line-height:1.65;-webkit-font-smoothing:antialiased}
  html[dir="rtl"] body{font-family:var(--sans-ar)}
  .sheet{max-width:620px;margin:0 auto;padding:40px 26px 90px;min-height:100vh;background:radial-gradient(90% 34% at 50% 0,rgba(180,138,85,.10),transparent 60%),var(--bg)}
  .lang{display:flex;gap:2px;justify-content:center;margin-bottom:26px}
  .lang button{background:none;border:0;cursor:pointer;font-family:var(--sans);font-size:.72rem;letter-spacing:.1em;color:var(--muted);padding:6px 10px;border-radius:8px}
  .lang button.on{color:var(--h1);background:var(--bg2)}
  .brand{text-align:center;margin-bottom:6px}
  .brand .ay{font-family:var(--serif);font-size:3.1rem;color:var(--price);line-height:1}
  html[dir="rtl"] .brand .ay{font-family:var(--serif-ar)}
  .brand .ch{font-size:.56rem;letter-spacing:.4em;text-transform:uppercase;color:var(--muted);margin-top:5px}
  .tag{text-align:center;font-family:var(--serif);font-style:italic;font-size:1.05rem;color:var(--muted);margin:14px 0 30px}
  html[dir="rtl"] .tag{font-family:var(--serif-ar);font-style:normal}
  .navpills{position:sticky;top:0;z-index:5;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:14px 0;background:linear-gradient(var(--bg) 72%,transparent);margin-bottom:6px}
  .pill{font-size:.72rem;letter-spacing:.02em;font-weight:500;padding:9px 18px;border-radius:11px;color:#5E4C40;background:#FCFAF7;border:1px solid #DCCFBE;cursor:pointer;transition:.25s}
  html[dir="rtl"] .pill{font-family:var(--sans-ar)}
  .pill.on{background:#4A3A2F;color:#FFFFFF}
  .cat h2{font-family:var(--serif);font-size:2rem;color:var(--h1);text-align:center;font-weight:400;margin-top:40px}
  html[dir="rtl"] .cat h2{font-family:var(--serif-ar)}

  .cat-hero{aspect-ratio:16/7;border-radius:14px;overflow:hidden;margin:18px 0 22px;box-shadow:0 20px 40px -28px rgba(62,48,39,.28)}
  .cat-hero img{width:100%;height:100%;object-fit:cover;display:block}

  .item{
    display:flex;gap:14px;align-items:center;padding:12px;border-radius:14px;
    border:1px solid var(--line);background:var(--card);margin-bottom:10px;
    transition:transform .3s ease,box-shadow .3s ease,border-color .3s ease;
  }
  .item:hover{transform:translateY(-2px);box-shadow:0 14px 30px -22px rgba(62,48,39,.3);border-color:#DCCFBE}
  .item-thumb{width:64px;height:64px;border-radius:10px;overflow:hidden;flex:none;background:linear-gradient(150deg,var(--bg2),#EBE3D5)}
  .item-thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .item-thumb-empty{display:flex;align-items:center;justify-content:center}
  .item-thumb-empty span{font-family:var(--serif);color:var(--price);font-size:.9rem;opacity:.55}
  .item-body{flex:1;min-width:0}
  .item-top{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
  .item .n{font-family:var(--serif);font-size:1.18rem;color:#4A3A2F}
  html[dir="rtl"] .item .n{font-family:var(--serif-ar)}
  .item .p{font-family:var(--serif);font-size:1.12rem;color:var(--price);white-space:nowrap}
  .item-bot{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-top:2px}
  .item .d{font-size:.8rem;color:var(--body);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item .k{font-size:.68rem;color:var(--muted);white-space:nowrap;letter-spacing:.04em}
  .foot{text-align:center;margin-top:48px;color:var(--muted);font-size:.82rem}
  .foot .g{font-family:var(--serif);font-style:italic;font-size:1.1rem;color:var(--price);margin-bottom:12px}
  html[dir="rtl"] .foot .g{font-family:var(--serif-ar);font-style:normal}
  .cal{margin-top:10px;font-size:.74rem;color:var(--muted)}
  @media print{.navpills,.lang{display:none}body,.sheet{background:#fff}}
</style>
</head>
<body>
<div class="sheet">
  <div class="lang" id="lang"><button data-l="tr" class="on">TR</button><button data-l="en">EN</button><button data-l="ar">AR</button></div>
  <div class="brand"><div class="ay">Ay</div><div class="ch">Coffee House</div></div>
  <p class="tag" data-t="tag">Sıcak bir atmosfer, unutulmaz anlar.</p>
  <nav class="navpills" id="pills"></nav>
  <div id="cats"></div>
  <div class="foot">
    <div class="g" data-t="good">İyi kahve · İyi yemek · İyi bir gün</div>
    <div data-t="addr">Kalkandere Merkez, Rize · Her gün 08:00—19:00</div>
    <div class="cal" data-t="cal">Kalori değerleri ortalamadır; yeni yönetmelik gereği bilgilendirme amaçlıdır.</div>
  </div>
</div>
<script>
const MENU={
  kahve:[
    {img:"espresso",n:{tr:"Espresso",en:"Espresso",ar:"إسبريسو"},d:{tr:"Ev harmanı, çikolata & fındık",en:"House blend, chocolate & hazelnut",ar:"خلطة المنزل، شوكولاتة وبندق"},p:70,k:5},
    {img:"americano",n:{tr:"Americano",en:"Americano",ar:"أمريكانو"},d:{tr:"Espresso, sıcak su",en:"Espresso, hot water",ar:"إسبريسو وماء ساخن"},p:75,k:10},
    {img:"latte",n:{tr:"Latte",en:"Latte",ar:"لاتيه"},d:{tr:"İpeksi mikro köpük",en:"Silky microfoam",ar:"رغوة حريرية ناعمة"},p:85,k:120},
    {img:"cappuccino",n:{tr:"Cappuccino",en:"Cappuccino",ar:"كابتشينو"},d:{tr:"İnce kakao serpme",en:"Dusted with fine cocoa",ar:"رشة كاكاو ناعمة"},p:85,k:110},
    {img:"flat-white",n:{tr:"Flat White",en:"Flat White",ar:"فلات وايت"},d:{tr:"Çift ristretto, ipeksi süt",en:"Double ristretto, silky milk",ar:"ريستريتو مزدوج وحليب حريري"},p:90,k:130},
    {img:"mocha",n:{tr:"Mocha",en:"Mocha",ar:"موكا"},d:{tr:"Espresso, çikolata, süt",en:"Espresso, chocolate, milk",ar:"إسبريسو وشوكولاتة وحليب"},p:95,k:220},
    {img:"caramel-latte",n:{tr:"Caramel Latte",en:"Caramel Latte",ar:"لاتيه كراميل"},d:{tr:"Ev yapımı karamel",en:"House-made caramel",ar:"كراميل محضّر منزليًا"},p:95,k:210},
    {img:"turk-kahvesi",n:{tr:"Türk Kahvesi",en:"Turkish Coffee",ar:"قهوة تركية"},d:{tr:"Bakır cezve, lokum ile",en:"Copper pot, with lokum",ar:"في ركوة نحاسية مع الملبن"},p:75,k:15},
    {img:"iced-latte-cold",n:{tr:"Iced Latte",en:"Iced Latte",ar:"آيس لاتيه"},d:{tr:"Buzlu, ipeksi süt",en:"Chilled, silky milk",ar:"مثلج وحليب حريري"},p:100,k:150}
  ],
  kahvedisi:[
    {img:"matcha-latte",n:{tr:"Matcha Latte",en:"Matcha Latte",ar:"ماتشا لاتيه"},d:{tr:"Tören matchası, süt",en:"Ceremonial matcha, milk",ar:"ماتشا احتفالية وحليب"},p:95,k:140},
    {img:"sicak-cikolata",n:{tr:"Sıcak Çikolata",en:"Hot Chocolate",ar:"شوكولاتة ساخنة"},d:{tr:"Belçika çikolatası",en:"Belgian chocolate",ar:"شوكولاتة بلجيكية"},p:90,k:300},
    {img:"chai-latte",n:{tr:"Chai Latte",en:"Chai Latte",ar:"تشاي لاتيه"},d:{tr:"Baharatlı, ballı",en:"Spiced, honeyed",ar:"بالتوابل والعسل"},p:90,k:190},
    {img:"limonata",n:{tr:"Limonata",en:"Lemonade",ar:"ليموناضة"},d:{tr:"Taze sıkım, nane",en:"Fresh-pressed, mint",ar:"عصير طازج بالنعناع"},p:80,k:90},
    {n:{tr:"Ekstra Shot",en:"Extra Shot",ar:"شوت إضافي"},d:{tr:"Tek shot espresso",en:"Single espresso shot",ar:"شوت إسبريسو مفرد"},p:15,k:5},
    {n:{tr:"Badem / Yulaf Sütü",en:"Almond / Oat Milk",ar:"حليب لوز / شوفان"},d:{tr:"Süt değişimi",en:"Milk swap",ar:"استبدال الحليب"},p:20,k:30}
  ],
  kahvalti:[
    {img:"mese-tabagi",n:{tr:"Meşe Tabağı Kahvaltı",en:"Oak Board Breakfast",ar:"طبق البلوط للفطور"},d:{tr:"Peynirler, zeytin, bal-kaymak, ekşi maya",en:"Cheeses, olives, honey-cream, sourdough",ar:"أجبان وزيتون وعسل بالقشطة وخبز مخمّر"},p:340,k:720},
    {img:"menemen",n:{tr:"Menemen",en:"Menemen",ar:"منمن"},d:{tr:"Yumuşak yumurta, domates, biber",en:"Soft eggs, tomato, pepper",ar:"بيض طري وطماطم وفلفل"},p:180,k:340},
    {img:"avokado-tost",n:{tr:"Avokado & Beyaz Peynir Tost",en:"Avocado & Feta Toast",ar:"توست أفوكادو وجبن فيتا"},d:{tr:"Ekşi maya, acı biber yağı",en:"Sourdough, chilli oil",ar:"خبز مخمّر وزيت الفلفل الحار"},p:210,k:380},
    {img:"simit-tabagi",n:{tr:"Simit & Peynir Tabağı",en:"Simit & Cheese Plate",ar:"صحن سميت وجبن"},d:{tr:"Taze simit, kaşar, reçel",en:"Fresh simit, kashar, jam",ar:"سميت طازج وقشقوان ومربى"},p:160,k:450},
    {img:"yogurt-granola",n:{tr:"Yoğurt & Granola",en:"Yoghurt & Granola",ar:"زبادي وغرانولا"},d:{tr:"Ev granolası, bal, meyve",en:"House granola, honey, fruit",ar:"غرانولا منزلية وعسل وفواكه"},p:145,k:290}
  ],
  tatli:[
    {img:"tiramisu-new",n:{tr:"Tiramisu",en:"Tiramisu",ar:"تيراميسو"},d:{tr:"Mascarpone, espresso",en:"Mascarpone, espresso",ar:"ماسكاربوني وإسبريسو"},p:140,k:420},
    {img:"cheesecake-berry",n:{tr:"Frenk Üzümlü Cheesecake",en:"Berry Cheesecake",ar:"تشيز كيك بالتوت"},d:{tr:"Orman meyveli sos",en:"Berry coulis",ar:"صوص التوت البري"},p:150,k:450},
    {img:"fistikli-kruvasan",n:{tr:"Antep Fıstıklı Kruvasan",en:"Pistachio Croissant",ar:"كرواسون بالفستق"},d:{tr:"İki kez pişmiş, çıtır",en:"Twice baked, crisp",ar:"مخبوز مرتين ومقرمش"},p:120,k:380},
    {img:"zeytinyagli-kek",n:{tr:"Zeytinyağlı Kek",en:"Olive Oil Cake",ar:"كيك زيت الزيتون"},d:{tr:"Narenciye, biberiye",en:"Citrus, rosemary",ar:"حمضيات وإكليل الجبل"},p:130,k:320},
    {img:"incir-tart",n:{tr:"Ballı İncir Tart",en:"Honey Fig Tart",ar:"تارت التين بالعسل"},d:{tr:"Mevsim inciri, badem",en:"Seasonal fig, almond",ar:"تين موسمي ولوز"},p:150,k:360},
    {img:"affogato",n:{tr:"Affogato",en:"Affogato",ar:"أفوغاتو"},d:{tr:"Vanilyalı dondurma, espresso",en:"Vanilla gelato, espresso",ar:"آيس كريم فانيلا وإسبريسو"},p:135,k:240}
  ]
};
const CAT_HERO={kahve:"hero-kahve",kahvalti:"hero-kahvalti",tatli:"hero-tatli"};
const CATS=["kahve","kahvedisi","kahvalti","tatli"];
const T={
 tr:{tag:"Sıcak bir atmosfer, unutulmaz anlar.",good:"İyi kahve · İyi yemek · İyi bir gün",addr:"Kalkandere Merkez, Rize · Her gün 08:00—19:00",cal:"Kalori değerleri ortalamadır; yeni yönetmelik gereği bilgilendirme amaçlıdır.",kcal:"kcal",cat:{kahve:"Kahve",kahvedisi:"Kahve Dışı",kahvalti:"Kahvaltı",tatli:"Tatlılar"}},
 en:{tag:"A warm atmosphere, unforgettable moments.",good:"Good coffee · Good food · Good day",addr:"Kalkandere, Rize · Every day 08:00—19:00",cal:"Calorie values are averages, shown for information per new regulation.",kcal:"kcal",cat:{kahve:"Coffee",kahvedisi:"Non-Coffee",kahvalti:"Breakfast",tatli:"Desserts"}},
 ar:{tag:"أجواء دافئة، لحظات لا تُنسى.",good:"قهوة جيدة · طعام جيد · يوم جيد",addr:"كالكانديري، ريزه · يوميًا ٠٨:٠٠—١٩:٠٠",cal:"قيم السعرات تقريبية، تُعرض للمعلومة وفقًا للائحة الجديدة.",kcal:"سعرة",cat:{kahve:"قهوة",kahvedisi:"مشروبات أخرى",kahvalti:"فطور",tatli:"حلويات"}}
};
let lang="tr";
function render(){
  document.getElementById("pills").innerHTML=CATS.map(c=>`<button class="pill" onclick="document.getElementById('cat-${c}').scrollIntoView({behavior:'smooth',block:'start'})">${T[lang].cat[c]}</button>`).join("");
  document.getElementById("cats").innerHTML=CATS.map(c=>{
    const heroImg = CAT_HERO[c];
    const hero = heroImg
      ? `<div class="cat-hero"><img src="images/${heroImg}.jpg" alt="" loading="lazy" decoding="async"></div>`
      : "";
    return `
    <section class="cat" id="cat-${c}"><h2>${T[lang].cat[c]}</h2>${hero}${
      MENU[c].map(it=>{
        const thumb = it.img
          ? `<div class="item-thumb"><img src="images/${it.img}.jpg" alt="" loading="lazy" decoding="async"></div>`
          : `<div class="item-thumb item-thumb-empty" aria-hidden="true"><span>Ay</span></div>`;
        return `<div class="item">
          ${thumb}
          <div class="item-body">
            <div class="item-top"><span class="n">${it.n[lang]}</span><span class="p">₺${it.p}</span></div>
            <div class="item-bot"><span class="d">${it.d[lang]}</span><span class="k">${it.k} ${T[lang].kcal}</span></div>
          </div>
        </div>`;
      }).join("")
    }</section>`;
  }).join("");
  document.querySelectorAll("[data-t]").forEach(el=>{if(T[lang][el.dataset.t])el.textContent=T[lang][el.dataset.t];});
}
function setLang(l){lang=l;document.documentElement.lang=l;document.documentElement.dir=l==="ar"?"rtl":"ltr";
  document.querySelectorAll(".lang button").forEach(b=>b.classList.toggle("on",b.dataset.l===l));render();}
document.getElementById("lang").querySelectorAll("button").forEach(b=>b.onclick=()=>setLang(b.dataset.l));
render();
</script>
</body>
</html>
